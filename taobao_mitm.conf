# Surge / Loon / Stash 等通用片段（参考 cankao.conf）
# 对应 taobao.py 中的 MTOP_URL：
# https://trade-acs.m.taobao.com/gw/mtop.taobao.detail.data.get/1.0/
#
# 使用前：
# 1. 把 taobao_dump.js 放到 Surge「脚本目录」或与配置同目录，并把下面脚本路径改成实际路径。
# 2. 开启 MITM，并安装对 trade-acs.m.taobao.com 的信任证书。
# 3. iPhone：Surge → 脚本 → 日志 里查看 console.log 输出。

[rewrite_local]
# 拦截详情接口响应体，仅打印日志，不修改返回内容（见 taobao_dump.js）
^https://trade-acs\.m\.taobao\.com/gw/mtop\.taobao\.detail\.data\.get/ url script-response-body https://raw.githubusercontent.com/Code-xy/cococo/refs/heads/main/taobao_dump.js

[mitm]
hostname = trade-acs.m.taobao.com
